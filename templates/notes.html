{% extends 'index.html' %}

{% block content %}
    <h2>Notes</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Note</th>
            </tr>
        </thead>
        <tbody>
            {% for note in notes %}
            <tr>
                <td>{{ note[0] }}</td>
                <td>{{ note[1] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
