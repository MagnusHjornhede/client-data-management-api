{% extends 'index.html' %}

{% block content %}
    <h2>Customer Areas</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Area</th>
            </tr>
        </thead>
        <tbody>
            {% for area in areas %}
            <tr>
                <td>{{ area[0] }}</td>
                <td>{{ area[1] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
