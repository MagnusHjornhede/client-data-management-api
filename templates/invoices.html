{% extends 'index.html' %}

{% block content %}
    <h2>Invoices</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Invoice</th>
            </tr>
        </thead>
        <tbody>
            {% for invoice in invoices %}
            <tr>
                <td>{{ invoice[0] }}</td>
                <td>{{ invoice[1] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
