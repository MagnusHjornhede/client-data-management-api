{% extends 'index.html' %}

{% block content %}
    <h2>Contracts</h2>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Contract</th>
            </tr>
        </thead>
        <tbody>
            {% for contract in contracts %}
            <tr>
                <td>{{ contract[0] }}</td>
                <td>{{ contract[1] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
